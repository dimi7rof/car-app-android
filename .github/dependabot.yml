version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Limit to a single open PR and group all action updates into one PR
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Limit to a single open PR and group all action updates into one PR
    open-pull-requests-limit: 1
    labels:
      - "actions"
    groups:
      all-actions:
        patterns:
          - "*"
